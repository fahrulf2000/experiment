<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kartu Ucapan Permintaan Maaf</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#f8d7da,#ffecec);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Surat Awal */
.envelope-wrapper{
    position:relative;
    width:320px;
    height:220px;
    cursor:pointer;
    transition:0.5s;
}

.envelope{
    position:absolute;
    width:100%;
    height:100%;
    background:#e07a7a;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.envelope:before{
    content:'';
    position:absolute;
    top:0;
    width:100%;
    height:100%;
    background:#d46b6b;
    clip-path:polygon(0 0,50% 55%,100% 0);
}

.letter-preview{
    position:absolute;
    top:20px;
    left:20px;
    right:20px;
    bottom:20px;
    background:white;
    border-radius:5px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    color:#d46b6b;
    font-family:'Dancing Script',cursive;
    transition:0.5s;
}

.envelope-wrapper:hover{
    transform:scale(1.03);
}

/* Popup */
.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    visibility:hidden;
    transition:0.4s;
    padding:20px;
}

.popup.active{
    opacity:1;
    visibility:visible;
}

.card{
    width:100%;
    max-width:700px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    animation:fadeIn 0.5s ease;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

@keyframes fadeIn{
    from{
        transform:translateY(30px);
        opacity:0;
    }
    to{
        transform:translateY(0);
        opacity:1;
    }
}

.header{
    background:#e07a7a;
    color:white;
    padding:20px;
    text-align:center;
}

.header h1{
    font-family:'Dancing Script',cursive;
    font-size:42px;
}

/* Kertas Bergaris */
.paper{
    padding:30px;
    min-height:350px;
    background:
        repeating-linear-gradient(
            white,
            white 30px,
            #d9e7ff 31px
        );
    position:relative;
}

.paper:before{
    content:'';
    position:absolute;
    top:0;
    left:55px;
    width:2px;
    height:100%;
    background:#ffb3b3;
}

textarea{
    width:100%;
    height:260px;
    border:none;
    outline:none;
    resize:none;
    background:transparent;
    font-size:18px;
    line-height:31px;
    padding-left:70px;
    color:#444;
    font-family:'Poppins',sans-serif;
}

/* Musik */
.music-box{
    padding:20px;
    border-top:1px solid #eee;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.music-box label{
    font-weight:600;
    color:#d46b6b;
}

input[type="file"]{
    padding:10px;
    border:1px solid #ddd;
    border-radius:10px;
}

audio{
    width:100%;
}

/* Tombol */
.buttons{
    display:flex;
    gap:10px;
    padding:20px;
    justify-content:center;
}

button{
    padding:12px 22px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

.open-btn{
    background:#fff;
    color:#d46b6b;
    border:2px solid #fff;
}

.close-btn{
    background:#e07a7a;
    color:white;
}
.next-btn{
    background:#ff8fab;
    color:white;
}

/* slideshow */

.slideshow{
    display:none;
    width:100%;
    height:350px;
    overflow:hidden;
    position:relative;
    background:#fff0f3;
}

.slideshow img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
}

.slideshow img.active{
    display:block;
}

button:hover{
    transform:translateY(-2px);
}

@media(max-width:600px){
    .header h1{
        font-size:32px;
    }

    textarea{
        font-size:16px;
    }
}
/* popup */
.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    visibility:hidden;
    transition:0.4s;
    padding:20px;
}

/* aktif */
.popup.active{
    opacity:1;
    visibility:visible;
}

/* halaman surat */
#letterPage{
    display:block;
}

/* halaman gif */
#gifPage{
    display:none;
}

/* gif page */
.gif-page{
    width:700px;
    max-width:95%;
    background:white;
    border-radius:20px;
    padding:20px;
    text-align:center;
    animation:fadeIn 0.5s ease;
}

.gif-page img{
    width:100%;
    height:500px;
    object-fit:cover;
    border-radius:15px;
}

.gif-buttons{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:15px;
}
</style>
</head>

<body>

<!-- Amplop -->
<div class="envelope-wrapper" id="openLetter">
    <div class="envelope"></div>
    <div class="letter-preview">
        Klik Untuk Membuka Surat 💌
    </div>
</div>

<!-- Popup -->
<div class="popup" id="popup">

    <!-- HALAMAN SURAT -->
    <div class="card" id="letterPage">

        <div class="header">
            <h1>untuk wawa ku tercinta</h1>
        </div>

        <div class="paper">
<textarea>
Terima kasih ya sudah berjuang selama ini, kamu yang tak kenal lelah kerja malam ketemu pagi.
Terima kasih juga mau menunggu ku yang masih berjuang melawan sakit.
setelah semua terlewat aku akan buat kamu bahagia dunia akhirat, janjiku di kamu dari awal sampai sekarang
jika aku masih ada kurang nya aku sangat-sangat minta maaf sebesar-besarnya, semangat ya sayang, kuperjuangkan kebahagiaanmu.
pengen bilang langsung bisa ku hanya di codingan ini, wkwkwk.
love you sayangku....

kamu wanita terhebat, terkuat, dan tercantik yang kutemui di hidup ini.
</textarea>
    </div>

        <audio id="bgMusic" autoplay loop>
    <source src="Brielle Album Version.mp3" type="audio/mpeg">
</audio>

        <!-- Tombol -->
        <div class="buttons">
        <button class="close-btn" id="closePopup">Tutup</button>
        <button class="next-btn" id="nextSlide">Next ❤️</button>
    </div>

</div>


<!-- HALAMAN GIF -->
<div class="gif-page" id="gifPage">

    <img id="gifViewer" src="1.gif">

    <div class="gif-buttons">
        <button id="prevGif">Prev</button>
        <button id="nextGif">Next</button>
    </div>

</div>
        </div>

    </div>
</div>

<script>
const openLetter = document.getElementById('openLetter');
const popup = document.getElementById('popup');

const closePopup = document.getElementById('closePopup');
const nextSlide = document.getElementById('nextSlide');

const letterPage = document.getElementById('letterPage');
const gifPage = document.getElementById('gifPage');

const gifViewer = document.getElementById('gifViewer');

const nextGif = document.getElementById('nextGif');
const prevGif = document.getElementById('prevGif');

const bgMusic = document.getElementById('bgMusic');

const gifs = [
    "1.gif",
    "2.gif",
    "3.gif",
    "4.gif"
];

let currentGif = 0;


// buka surat
openLetter.addEventListener('click', () => {

    popup.classList.add('active');

    // tampil surat
    letterPage.style.display = 'block';

    // sembunyikan gif
    gifPage.style.display = 'none';

    bgMusic.play();
});


// tombol next dari surat ke gif
nextSlide.addEventListener('click', () => {

    // sembunyikan surat TOTAL
    letterPage.style.display = 'none';

    // tampilkan halaman gif
    gifPage.style.display = 'block';

    gifViewer.src = gifs[currentGif];
});


// next gif
nextGif.addEventListener('click', () => {

    currentGif++;

    if(currentGif >= gifs.length){
        currentGif = 0;
    }

    gifViewer.src = gifs[currentGif];
});


// prev gif
prevGif.addEventListener('click', () => {

    currentGif--;

    if(currentGif < 0){
        currentGif = gifs.length - 1;
    }

    gifViewer.src = gifs[currentGif];
});


// tutup popup
closePopup.addEventListener('click', () => {

    popup.classList.remove('active');

    bgMusic.pause();

    // reset halaman
    letterPage.style.display = 'block';
    gifPage.style.display = 'none';
});
</script>

</body>
</html>
